<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>效率工具集</title>
<style>
  :root {
    --bg: #0b0e14; --surface: #141820; --border: #282d3a;
    --text: #e1e6f0; --text2: #7b8196;
    --accent: #5b9cf5; --accent2: #a78bfa;
    --green: #34d399;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .container { max-width: 700px; width: 100%; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--text2); font-size: 14px; margin-top: 8px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 24px; text-decoration: none; color: var(--text);
    transition: all 0.2s; display: block; position: relative; overflow: hidden;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card::before { content: ''; position: absolute; top:0; left:0; right:0; height: 3px; }
  .card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .card:nth-child(2)::before { background: linear-gradient(90deg, var(--green), var(--accent)); }
  .card .icon { font-size: 36px; margin-bottom: 14px; }
  .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .card .desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .card .tags { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
  .tag {
    padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600;
    background: rgba(91,156,245,0.1); color: var(--accent);
  }
  .tag:nth-child(even) { background: rgba(167,139,250,0.1); color: var(--accent2); }
  .footer { text-align: center; margin-top: 40px; font-size: 11px; color: var(--text2); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚡ 效率工具集</h1>
    <p>纯静态 · 本地存储 · 无需网络</p>
  </div>
  <div class="cards">
    <a href="apps/habit-tracker/" class="card">
      <div class="icon">✅</div>
      <h2>习惯打卡</h2>
      <div class="desc">习惯养成追踪，每日打卡，自定义完成档次，每周休息日，日历热力图，笔记与 PDF 导出。</div>
      <div class="tags"><span class="tag">习惯追踪</span><span class="tag">每日打卡</span><span class="tag">日历视图</span><span class="tag">PDF 导出</span></div>
    </a>
    <a href="apps/timer-app/" class="card">
      <div class="icon">⏱️</div>
      <h2>专注计时器</h2>
      <div class="desc">任务计时，自定义总时长与每日目标，进度可视化，快捷笔记，每日提醒，PDF 报告导出。</div>
      <div class="tags"><span class="tag">任务计时</span><span class="tag">进度追踪</span><span class="tag">每日提醒</span><span class="tag">PDF 导出</span></div>
    </a>
  </div>
  <div class="footer">数据仅存储在浏览器中 · 建议定期导出备份</div>
</div>
</body>
</html>
