<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 仿真书架 - 书本翻页阅读器</title>
<style>
  :root {
    --shelf-wood: #8B5E3C; --shelf-dark: #5C3A1E;
    --page-cream: #FDF5E6; --text-color: #3B2F2F;
    --font-size: 1.05rem; --line-height: 1.85;
    --page-pad-x: 32px; --page-pad-y: 36px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Georgia','Noto Serif SC','SimSun','PingFang SC','Microsoft YaHei',serif;
    background:#2C1810;
    background-image:radial-gradient(ellipse at center,#3E2723 0%,#1a0e08 100%);
    height:100vh;overflow:hidden;user-select:none;
    -webkit-user-select:none;
  }

  /* 导航 */
  .navbar{
    position:fixed;top:0;left:0;right:0;z-index:1000;height:56px;
    background:linear-gradient(180deg,rgba(44,24,16,0.98),rgba(44,24,16,0.92));
    backdrop-filter:blur(10px);padding:0 28px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid rgba(139,94,60,0.3);
  }
  .navbar h1{color:#F5DEB3;font-size:1.4rem;letter-spacing:2px}
  .nav-actions{display:flex;gap:12px;align-items:center}
  .btn{
    padding:8px 18px;border:none;border-radius:7px;cursor:pointer;
    font-size:0.9rem;font-family:inherit;transition:all 0.25s;white-space:nowrap
  }
  .btn-upload{
    background:linear-gradient(135deg,#8B5E3C,#A0704D);color:#FFF8DC;
    box-shadow:0 2px 8px rgba(139,94,60,0.4)
  }
  .btn-upload:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(139,94,60,0.6)}
  .btn-back-shelf{
    background:rgba(245,222,179,0.15);color:#F5DEB3;
    border:1px solid rgba(245,222,179,0.3)
  }
  .btn-back-shelf:hover{background:rgba(245,222,179,0.25)}
  .storage-info{color:#A09080;font-size:0.78rem}
  #fileInput{display:none}

  /* 书架 */
  .shelf-container{
    position:fixed;top:56px;left:0;right:0;bottom:0;overflow-y:auto;
    display:flex;flex-direction:column;align-items:center;
    padding-top:40px;padding-bottom:60px
  }
  .shelf-title{color:#D4C5A0;font-size:1.05rem;letter-spacing:3px;margin-bottom:28px;opacity:0.7}
  .shelf-row{
    position:relative;width:90%;max-width:1100px;
    display:flex;flex-wrap:wrap;gap:8px;
    padding:30px 40px 50px;justify-content:center;align-items:flex-end;flex-shrink:0
  }
  .shelf-plank{
    position:absolute;bottom:0;left:0;right:0;height:20px;
    background:linear-gradient(0deg,var(--shelf-dark) 0%,var(--shelf-wood) 40%,#A0704D 100%);
    border-radius:3px;box-shadow:0 6px 18px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1)
  }
  .shelf-plank::after{
    content:'';position:absolute;bottom:-4px;left:0;right:0;height:5px;
    background:var(--shelf-dark);border-radius:0 0 3px 3px
  }
  .empty-hint{color:#A09080;font-size:1.15rem;text-align:center;padding:80px 20px;z-index:1;width:100%}
  .empty-hint .icon{font-size:3rem;display:block;margin-bottom:16px}
  .empty-hint .sub{font-size:0.85rem;margin-top:8px;opacity:0.6}

  .book-spine{
    position:relative;z-index:2;width:42px;height:190px;
    border-radius:4px 6px 6px 4px;cursor:pointer;
    transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);
    box-shadow:2px 4px 10px rgba(0,0,0,0.5);
    writing-mode:vertical-rl;display:flex;align-items:center;justify-content:center;
    overflow:hidden;flex-shrink:0
  }
  .book-spine:hover{
    transform:translateY(-14px) rotateY(-8deg) scale(1.05);
    box-shadow:4px 12px 24px rgba(0,0,0,0.7);z-index:20
  }
  .book-spine .spine-title{
    font-size:0.72rem;font-weight:bold;letter-spacing:3px;
    padding:10px 4px;text-align:center;color:rgba(255,255,255,0.95);
    text-shadow:0 1px 3px rgba(0,0,0,0.5);line-height:1.4;pointer-events:none
  }
  .book-spine .spine-delete{
    position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;
    background:rgba(0,0,0,0.4);color:#fff;border:none;font-size:10px;
    cursor:pointer;display:none;align-items:center;justify-content:center;z-index:5
  }
  .book-spine:hover .spine-delete{display:flex}
  .book-spine .spine-delete:hover{background:rgba(200,50,50,0.8)}

  .book-color-0{background:linear-gradient(135deg,#6B3A5B,#8B4A7B)}
  .book-color-1{background:linear-gradient(135deg,#2E4A62,#3D6A8A)}
  .book-color-2{background:linear-gradient(135deg,#5C3D2E,#7D5A4A)}
  .book-color-3{background:linear-gradient(135deg,#3D5C3A,#5A7D4A)}
  .book-color-4{background:linear-gradient(135deg,#8B3A3A,#A84D4D)}
  .book-color-5{background:linear-gradient(135deg,#3A5A6B,#4D7D8B)}
  .book-color-6{background:linear-gradient(135deg,#6B5A3A,#8B7D4D)}
  .book-color-7{background:linear-gradient(135deg,#4A3A6B,#6B5A8B)}

  /* 阅读器 */
  .reader-container{
    display:none;position:fixed;top:56px;left:0;right:0;bottom:0;
    flex-direction:column;align-items:center;padding:12px 80px 16px
  }
  .reader-container.active{display:flex}
  .reader-toolbar{
    display:flex;align-items:center;gap:16px;flex-shrink:0;margin-bottom:8px;
    flex-wrap:wrap;justify-content:center
  }
  .reader-toolbar .book-title-display{
    color:#F5DEB3;font-size:1.2rem;font-weight:bold;
    max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
  }
  .page-indicator{
    color:#C0B090;font-size:0.85rem;background:rgba(0,0,0,0.3);
    padding:4px 12px;border-radius:14px
  }

  .loading-overlay{
    display:none;position:fixed;inset:0;z-index:2000;
    background:rgba(0,0,0,0.7);flex-direction:column;align-items:center;
    justify-content:center;gap:18px
  }
  .loading-overlay.active{display:flex}
  .spinner{
    width:44px;height:44px;border:4px solid rgba(245,222,179,0.2);
    border-top-color:#F5DEB3;border-radius:50%;animation:spin 0.8s linear infinite
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:#F5DEB3;font-size:1.05rem}
  .loading-sub{color:#A09080;font-size:0.82rem}

  /* ═══════════════════════════════════
     3D 仿真翻页 — 核心区域
     ═══════════════════════════════════ */
  .book-stage{
    flex:1;min-height:0;width:92%;max-width:1000px;
    perspective:2000px;perspective-origin:50% 50%
  }

  /* 书本容器 + 阴影 */
  .book-wrap{
    position:relative;width:100%;height:100%;
    transform-style:preserve-3d
  }
  .book-shadow{
    position:absolute;inset:0;border-radius:4px 12px 12px 4px;
    box-shadow:0 8px 40px rgba(0,0,0,0.5);
    pointer-events:none
  }

  /* 静态的页面对开 */
  .page-spread{
    position:relative;display:flex;
    width:100%;height:100%;
    background:var(--page-cream);
    border-radius:4px 12px 12px 4px;
    overflow:hidden;
    box-shadow:inset 0 0 60px rgba(0,0,0,0.08)
  }
  .spine-line{
    position:absolute;left:0;top:0;bottom:0;width:24px;
    background:linear-gradient(90deg,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.03) 60%,transparent 100%);
    z-index:3;pointer-events:none
  }
  .center-fold{
    position:absolute;left:50%;top:0;bottom:0;width:1px;
    background:linear-gradient(180deg,transparent 5%,rgba(0,0,0,0.1) 30%,rgba(0,0,0,0.12) 50%,rgba(0,0,0,0.1) 70%,transparent 95%);
    z-index:3;pointer-events:none
  }

  .page-face{
    flex:1;min-width:0;min-height:0;position:relative;
    padding:var(--page-pad-y) var(--page-pad-x);
    display:flex;flex-direction:column;z-index:1
  }
  .page-face.left{padding-right:22px}
  .page-face.right{padding-left:22px}
  .page-text{
    flex:1;min-height:0;font-size:var(--font-size);line-height:var(--line-height);
    color:var(--text-color);text-align:justify;overflow-y:auto;
    scrollbar-width:thin;scrollbar-color:#C8B898 transparent;padding-right:6px
  }
  .page-text::-webkit-scrollbar{width:5px}
  .page-text::-webkit-scrollbar-thumb{background:#C8B898;border-radius:3px}
  .page-text::-webkit-scrollbar-track{background:transparent}
  .page-num{
    position:absolute;bottom:12px;font-size:0.78rem;color:#B0A080
  }
  .page-face.left .page-num{left:var(--page-pad-x)}
  .page-face.right .page-num{right:var(--page-pad-x)}

  /* ═══════════════════════════════════
     翻页按钮（左右箭头）
     ═══════════════════════════════════ */
  .flip-btn{
    position:absolute;top:50%;transform:translateY(-50%);
    width:42px;height:68px;border:none;cursor:pointer;
    background:rgba(0,0,0,0.04);border-radius:8px;
    font-size:1.4rem;color:#8B7D6B;transition:all 0.2s;z-index:30;
    display:flex;align-items:center;justify-content:center
  }
  .flip-btn:hover{background:rgba(0,0,0,0.12);color:#5C4A3A}
  .flip-btn:active{background:rgba(0,0,0,0.2)}
  .flip-btn-left{left:-52px}
  .flip-btn-right{right:-52px}
  .flip-btn:disabled{opacity:0.15;cursor:default;pointer-events:none}

  /* 进度条 */
  .progress-wrap{
    flex-shrink:0;width:92%;max-width:1000px;height:3px;
    background:rgba(255,255,255,0.1);border-radius:2px;
    margin-top:10px;overflow:hidden
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,#8B5E3C,#C8A878);
    border-radius:2px;transition:width 0.4s
  }

  /* Toast */
  .toast{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:3000;
    padding:10px 26px;border-radius:10px;background:#3E2723;color:#F5DEB3;
    font-size:0.9rem;box-shadow:0 6px 24px rgba(0,0,0,0.5);
    animation:toastIn 0.3s ease-out,toastOut 0.3s 2.5s ease-in forwards;
    pointer-events:none
  }
  .toast.error{background:#5C1A1A}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}

  /* 响应式 */
  @media(max-width:768px){
    :root{--font-size:0.85rem;--page-pad-x:14px;--page-pad-y:16px}
    .reader-container{padding:8px 40px 10px}
    .book-stage{width:96%}
    .flip-btn{width:28px;height:44px;font-size:0.9rem}
    .flip-btn-left{left:-32px}.flip-btn-right{right:-32px}
    .book-spine{width:34px;height:150px}
    .page-face.left{padding-right:14px}.page-face.right{padding-left:14px}
  }
</style>
</head>
<body>

<nav class="navbar">
  <h1>📚 我的书架</h1>
  <div class="nav-actions">
    <span class="storage-info" id="storageInfo"></span>
    <button class="btn btn-back-shelf" id="btnBackShelf" style="display:none" onclick="backToShelf()">← 返回书架</button>
    <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">📂 上传 TXT</button>
  </div>
</nav>

<input type="file" id="fileInput" accept=".txt" onchange="handleFileUpload(this)">

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">正在处理...</div>
  <div class="loading-sub" id="loadingSub"></div>
</div>

<!-- 书架 -->
<div class="shelf-container" id="shelfView">
  <div class="shelf-title">— 点击书脊开始阅读 —</div>
  <div class="shelf-row" id="shelfRow">
    <div class="shelf-plank"></div>
    <div class="empty-hint" id="emptyHint">
      <span class="icon">📖</span>书架空空如也<br>
      <span class="sub">点击上方「上传 TXT」添加书籍，支持大文件</span>
    </div>
  </div>
  <div class="shelf-row" id="shelfRow2" style="margin-top:36px;display:none">
    <div class="shelf-plank"></div>
  </div>
</div>

<!-- 阅读器 -->
<div class="reader-container" id="readerView">
  <div class="reader-toolbar">
    <span class="book-title-display" id="bookTitleDisplay"></span>
    <span class="page-indicator" id="pageIndicator"></span>
  </div>

  <div class="book-stage" id="bookStage">
    <div class="book-wrap" id="bookWrap">
      <div class="book-shadow"></div>

      <!-- 静态页面层 -->
      <div class="page-spread" id="pageSpread">
        <button class="flip-btn flip-btn-left" id="btnPrev" onclick="flipPage(-1)">◀</button>
        <div class="spine-line"></div>
        <div class="center-fold"></div>
        <div class="page-face left">
          <div class="page-text" id="pageL"></div>
          <div class="page-num" id="pageNumL"></div>
        </div>
        <div class="page-face right">
          <div class="page-text" id="pageR"></div>
          <div class="page-num" id="pageNumR"></div>
        </div>
        <button class="flip-btn flip-btn-right" id="btnNext" onclick="flipPage(1)">▶</button>
      </div>

    </div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progressBar"></div></div>
</div>

<script>
// ═══════════════════════════════════════════
//  IndexedDB
// ═══════════════════════════════════════════
const DB_NAME='codex_bookshelf_db',DB_VERSION=2;
let db=null;
let dbReadyResolve=null;
let dbReady=new Promise(function(r){dbReadyResolve=r});

function openDB(){return new Promise(function(resolve,reject){
  var req=indexedDB.open(DB_NAME,DB_VERSION);
  req.onupgradeneeded=function(e){
    var d=e.target.result;
    if(!d.objectStoreNames.contains('books'))d.createObjectStore('books',{keyPath:'id'});
    if(!d.objectStoreNames.contains('progress'))d.createObjectStore('progress',{keyPath:'bookId'});
    if(!d.objectStoreNames.contains('page_cache'))d.createObjectStore('page_cache',{keyPath:'cacheKey'});
  };
  req.onsuccess=function(e){db=e.target.result;dbReadyResolve();resolve(db)};
  req.onerror=function(e){reject(e.target.error)};
})}

function dbOp(store,mode,fn){return dbReady.then(function(){return new Promise(function(resolve,reject){
  var tx=db.transaction(store,mode),s=tx.objectStore(store),r=fn(s);
  if(r instanceof IDBRequest){r.onsuccess=function(){resolve(r.result)};r.onerror=function(e){reject(e.target.error)}}
  else{tx.oncomplete=function(){resolve(r)};tx.onerror=function(e){reject(e.target.error)}}
})})}

var dbPut=function(s,d){return dbOp(s,'readwrite',function(st){return st.put(d)})};
var dbGet=function(s,k){return dbOp(s,'readonly',function(st){return st.get(k)})};
var dbGetAll=function(s){return dbOp(s,'readonly',function(st){return st.getAll()})};
var dbDelete=function(s,k){return dbOp(s,'readwrite',function(st){return st.delete(k)})};

async function estimateStorage(){
  if(navigator.storage&&navigator.storage.estimate){var e=await navigator.storage.estimate();return{usage:e.usage||0,quota:e.quota||0}}
  return{usage:0,quota:0}
}
function fmtBytes(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}

// ═══════════════════════════════════════════
//  段落索引
// ═══════════════════════════════════════════
function buildParaOffsets(content){
  var o=[0],len=content.length,i=0;
  while(i<len){var nl=content.indexOf('\n',i);if(nl===-1)break;var nx=nl+1;while(nx<len&&content.charCodeAt(nx)===10)nx++;if(nx<len)o.push(nx);i=nx}
  return o
}
function paginateFromParas(content,paraOffsets,cpp){
  var offsets=[],pi=0,tp=paraOffsets.length,tl=content.length;
  while(pi<tp){offsets.push(paraOffsets[pi]);var cc=0;
    while(pi<tp&&cc<cpp){var ps=paraOffsets[pi],pe=(pi+1<tp)?paraOffsets[pi+1]:tl;cc+=(pe-ps);pi++}
    if(cc>cpp*1.6&&pi>offsets.length&&pi>0)pi--
  }
  if(offsets.length%2!==0)offsets.push(tl);
  return{offsets:offsets,totalChars:tl,pageCount:offsets.length}
}

// ═══════════════════════════════════════════
//  状态
// ═══════════════════════════════════════════
var COLORS=['book-color-0','book-color-1','book-color-2','book-color-3','book-color-4','book-color-5','book-color-6','book-color-7'],cIdx=0;
var books=[],currentBook=null,pageOffsets=[],currentPageIndex=0,isFlipping=false;
var bookContentCache=null,bookParaOffsets=null;

// ═══════════════════════════════════════════
//  Toast / Loading
// ═══════════════════════════════════════════
function toast(msg,err){var ex=document.querySelector('.toast');if(ex)ex.remove();var el=document.createElement('div');el.className='toast'+(err?' error':'');el.textContent=msg;document.body.appendChild(el);setTimeout(function(){el.remove()},3000)}
function showLoading(text,sub){document.getElementById('loadingText').textContent=text||'处理中...';document.getElementById('loadingSub').textContent=sub||'';document.getElementById('loadingOverlay').classList.add('active')}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('active')}

// ═══════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════
async function init(){await openDB();books=await dbGetAll('books');books.sort(function(a,b){return(b.createdAt||0)-(a.createdAt||0)});renderShelf();updateStorageInfo()}
async function updateStorageInfo(){var e=await estimateStorage(),el=document.getElementById('storageInfo');if(e.quota>0)el.textContent=fmtBytes(e.usage)+' / '+fmtBytes(e.quota)}

// ═══════════════════════════════════════════
//  上传
// ═══════════════════════════════════════════
async function handleFileUpload(input){
  var file=input.files[0];if(!file)return;
  if(!file.name.toLowerCase().endsWith('.txt')){toast('请上传 .txt 文件',true);input.value='';return}
  var sizeMB=(file.size/1048576).toFixed(1);showLoading('正在读取文件...',file.name+' ('+sizeMB+' MB)');
  try{
    var content=await readFile(file),title=file.name.replace(/\.txt$/i,'');
    var book={id:Date.now().toString(),title:title,totalChars:content.length,color:COLORS[cIdx%COLORS.length],createdAt:Date.now()};cIdx++;
    var paraOffsets=buildParaOffsets(content);
    await dbPut('books',{id:book.id,title:book.title,totalChars:book.totalChars,color:book.color,createdAt:book.createdAt,content:content,paraOffsets:paraOffsets});
    books.unshift(book);renderShelf();updateStorageInfo();
    preCacheOffsets(book.id,content,paraOffsets);
    toast('✅ 《'+title+'》已添加 ('+fmtBytes(file.size)+')，后台预缓存中...')
  }catch(err){console.error('Upload error:',err);toast('读取失败: '+(err.message||err.toString()),true)}
  finally{hideLoading();input.value=''}
}
function readFile(file){return new Promise(function(resolve,reject){
  var r=new FileReader();
  r.onload=function(){var buf=r.result,encodings=['utf-8','gbk','gb18030','big5'],best=null,bestScore=Infinity;
    for(var i=0;i<encodings.length;i++){try{var d=new TextDecoder(encodings[i],{fatal:false}),text=d.decode(new Uint8Array(buf)),bad=0;
      for(var j=0;j<text.length;j++){if(text.charCodeAt(j)===0xFFFD)bad++;if(bad>bestScore)break}
      if(bad<bestScore){bestScore=bad;best=text}if(bad===0&&encodings[i]==='utf-8')break}catch(e){}}
    if(best!==null&&best.length>0)resolve(best);else{var fb=new TextDecoder('utf-8',{fatal:false});resolve(fb.decode(new Uint8Array(buf)))}};
  r.onerror=function(e){reject(new Error('文件读取失败，请检查文件是否损坏'))};r.readAsArrayBuffer(file)
})}

// ═══════════════════════════════════════════
//  书架
// ═══════════════════════════════════════════
function renderShelf(){
  var row=document.getElementById('shelfRow'),row2=document.getElementById('shelfRow2'),hint=document.getElementById('emptyHint');
  row.querySelectorAll('.book-spine').forEach(function(e){e.remove()});row2.querySelectorAll('.book-spine').forEach(function(e){e.remove()});
  if(books.length===0){hint.style.display='block';row2.style.display='none';return}
  hint.style.display='none';var MAX=12,r1=books.slice(0,MAX),r2=books.slice(MAX);
  r1.forEach(function(b){row.insertBefore(spineEl(b),row.querySelector('.shelf-plank'))});
  if(r2.length>0){row2.style.display='flex';r2.forEach(function(b){row2.insertBefore(spineEl(b),row2.querySelector('.shelf-plank'))})}else row2.style.display='none'
}
function spineEl(book){
  var el=document.createElement('div');el.className='book-spine '+book.color;el.title=book.title;
  el.onclick=function(e){if(!e.target.classList.contains('spine-delete'))openBook(book)};
  var t=document.createElement('span');t.className='spine-title';t.textContent=book.title;el.appendChild(t);
  var d=document.createElement('button');d.className='spine-delete';d.textContent='✕';
  d.onclick=async function(e){e.stopPropagation();if(confirm('确定删除《'+book.title+'》？')){await deleteBook(book.id)}};el.appendChild(d);return el
}
async function deleteBook(id){
  await dbDelete('books',id);await dbDelete('progress',id);
  var allCache=await dbGetAll('page_cache');for(var i=0;i<allCache.length;i++){if(allCache[i].cacheKey.indexOf(id+'_')===0)await dbDelete('page_cache',allCache[i].cacheKey)}
  books=books.filter(function(b){return b.id!==id});if(currentBook&&currentBook.id===id)backToShelf();
  renderShelf();updateStorageInfo();toast('已删除')
}

// ═══════════════════════════════════════════
//  缓存
// ═══════════════════════════════════════════
function cacheBucket(cpp){return Math.round(cpp/50)*50}
function cacheKey(bookId,bucket){return bookId+'_'+bucket}
async function getCachedOffsets(bookId,bucket){var e=await dbGet('page_cache',cacheKey(bookId,bucket));return e?e.offsets:null}
async function setCachedOffsets(bookId,bucket,offsets){await dbPut('page_cache',{cacheKey:cacheKey(bookId,bucket),bookId:bookId,bucket:bucket,offsets:offsets,createdAt:Date.now()})}
function preCacheOffsets(bookId,content,paraOffsets){setTimeout(async function(){try{var cpp=calcCharsPerPage(),bucket=cacheBucket(cpp);if(await getCachedOffsets(bookId,bucket))return;var r=paginateFromParas(content,paraOffsets,cpp);await setCachedOffsets(bookId,bucket,r.offsets)}catch(e){}},500)}

// ═══════════════════════════════════════════
//  charsPerPage
// ═══════════════════════════════════════════
function calcCharsPerPage(){
  var pl=document.querySelector('.page-face.left');if(!pl)return 800;
  var cs=getComputedStyle(pl),fs=parseFloat(cs.fontSize),lh=parseFloat(cs.lineHeight);
  if(isNaN(lh))lh=fs*1.85;
  var cw=pl.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight)-6;
  var ch=pl.clientHeight-parseFloat(cs.paddingTop)-parseFloat(cs.paddingBottom)-28;
  var acw=fs*0.85,cpl=Math.floor(cw/acw),lpp=Math.floor(ch/lh);
  if(cpl<10)cpl=10;if(lpp<5)lpp=5;return cpl*lpp
}

// ═══════════════════════════════════════════
//  打开书籍
// ═══════════════════════════════════════════
async function openBook(book){
  document.getElementById('shelfView').style.display='none';document.getElementById('readerView').classList.add('active');
  document.getElementById('btnBackShelf').style.display='inline-block';document.getElementById('bookTitleDisplay').textContent='📖 '+book.title;
  await raf();var cpp=calcCharsPerPage(),bucket=cacheBucket(cpp);
  var cachedOffsets=await getCachedOffsets(book.id,bucket);
  if(cachedOffsets){
    var record=await dbGet('books',book.id);if(!record||!record.content){toast('数据丢失',true);backToShelf();return}
    bookContentCache=record.content;
    if(!bookParaOffsets||bookParaOffsets.length===0){if(record.paraOffsets&&record.paraOffsets.length>0)bookParaOffsets=record.paraOffsets;else bookParaOffsets=buildParaOffsets(bookContentCache)}
    pageOffsets=cachedOffsets;currentBook={id:book.id,title:book.title,color:book.color,pageCount:pageOffsets.length,totalChars:bookContentCache.length};
    var saved=await dbGet('progress',book.id);
    if(saved&&saved.pageIndex!=null)currentPageIndex=Math.floor(Math.min(saved.pageIndex,Math.max(0,pageOffsets.length-2))/2)*2;else currentPageIndex=0;
    renderSpread();updateProgress();toast('⚡ 秒开 · 《'+book.title+'》共 '+pageOffsets.length+' 页');return
  }
  showLoading('正在排版...','《'+book.title+'》');
  try{
    var record=await dbGet('books',book.id);if(!record||!record.content){toast('数据丢失',true);hideLoading();backToShelf();return}
    bookContentCache=record.content;
    if(!bookParaOffsets||bookParaOffsets.length===0){if(record.paraOffsets&&record.paraOffsets.length>0)bookParaOffsets=record.paraOffsets;else bookParaOffsets=buildParaOffsets(bookContentCache)}
    var result=paginateFromParas(bookContentCache,bookParaOffsets,cpp);pageOffsets=result.offsets;
    await setCachedOffsets(book.id,bucket,pageOffsets);
    currentBook={id:book.id,title:book.title,color:book.color,pageCount:pageOffsets.length,totalChars:bookContentCache.length};
    var saved=await dbGet('progress',book.id);
    if(saved&&saved.pageIndex!=null)currentPageIndex=Math.floor(Math.min(saved.pageIndex,Math.max(0,pageOffsets.length-2))/2)*2;else currentPageIndex=0;
    renderSpread();updateProgress();hideLoading();toast('《'+book.title+'》共 '+pageOffsets.length+' 页（已缓存）')
  }catch(err){console.error(err);hideLoading();toast('打开失败: '+err.message,true);backToShelf()}
}

function raf(){return new Promise(function(r){requestAnimationFrame(r)})}

async function backToShelf(){
  if(currentBook)await dbPut('progress',{bookId:currentBook.id,pageIndex:currentPageIndex,updatedAt:Date.now()});
  document.getElementById('readerView').classList.remove('active');document.getElementById('shelfView').style.display='';
  document.getElementById('btnBackShelf').style.display='none';
  currentBook=null;pageOffsets=[];bookContentCache=null;bookParaOffsets=null
}

// ═══════════════════════════════════════════
//  渲染页面对开
// ═══════════════════════════════════════════
function getPageText(idx){if(idx>=pageOffsets.length)return null;var s=pageOffsets[idx],e=idx+1<pageOffsets.length?pageOffsets[idx+1]:bookContentCache.length;return bookContentCache.substring(s,e)}
function fmtContent(text){if(text==null)return'<p style="color:#B0A080;text-align:center;padding-top:40%;">（空白页）</p>';return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

function renderSpread(){
  var li=currentPageIndex,ri=currentPageIndex+1,lt=getPageText(li),rt=ri<pageOffsets.length?getPageText(ri):null;
  document.getElementById('pageL').innerHTML=fmtContent(lt);
  document.getElementById('pageR').innerHTML=rt!==null?fmtContent(rt):'<p style="color:#B0A080;text-align:center;padding-top:40%;">（全书完）</p>';
  document.getElementById('pageNumL').textContent=lt!==null?'第 '+(li+1)+' 页':'';
  document.getElementById('pageNumR').textContent=rt!==null?'第 '+(ri+1)+' 页':'';
  var total=pageOffsets.length;
  document.getElementById('pageIndicator').textContent=(li+2>total?(li+1):(li+1)+'-'+Math.min(ri+1,total))+' / '+total+' 页';
  document.getElementById('btnPrev').disabled=currentPageIndex<=0;
  document.getElementById('btnNext').disabled=currentPageIndex+2>=total
}

// ═══════════════════════════════════════════
//  直接翻页
function flipPage(direction){
  if(isFlipping||!currentBook)return;
  var ni=currentPageIndex+direction*2;
  if(ni<0||ni>=pageOffsets.length)return;
  currentPageIndex=ni;
  renderSpread();updateProgress();
}



function updateProgress(){
  var pct=pageOffsets.length>0?Math.min(100,((currentPageIndex+2)/pageOffsets.length)*100):0;
  document.getElementById('progressBar').style.width=pct+'%'
}

// ═══════════════════════════════════════════
//  鼠标/触摸拖拽翻页
// ═══════════════════════════════════════════
var dragState=null;
var bookStage=null;

function initDrag(){
  bookStage=document.getElementById('bookStage');
  bookStage.addEventListener('mousedown',onDragStart);
  bookStage.addEventListener('touchstart',onDragStart,{passive:false});
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('mouseup',onDragEnd);
  document.addEventListener('touchend',onDragEnd);
}

function getEventPos(e){
  if(e.touches&&e.touches.length>0)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY}
}

function onDragStart(e){
  if(!currentBook||isFlipping)return;
  var pos=getEventPos(e),rect=bookStage.getBoundingClientRect();
  // 只在页面中间区域触发拖拽（避开滚动条）
  if(pos.x<rect.left+30||pos.x>rect.right-30)return;
  if(pos.y<rect.top+20||pos.y>rect.bottom-20)return;

  var midX=rect.left+rect.width/2;
  dragState={startX:pos.x,startY:pos.y,midX:midX,rect:rect,dragging:false};
  e.preventDefault()
}

function onDragMove(e){
  if(!dragState)return;
  var pos=getEventPos(e),dx=pos.x-dragState.startX;
  if(Math.abs(dx)<8&&!dragState.dragging)return;
  dragState.dragging=true;
  // 视觉反馈：轻微的页面倾斜
  var spread=document.getElementById('pageSpread');
  var tilt=Math.max(-3,Math.min(3,dx*0.03));
  spread.style.transform='rotateY('+tilt+'deg)';
  spread.style.transition='none'
}

function onDragEnd(e){
  if(!dragState)return;
  var spread=document.getElementById('pageSpread');
  spread.style.transform='';spread.style.transition='';
  if(dragState.dragging){
    var pos=getEventPos(e),dx=pos.x-dragState.startX;
    if(dx>60)flipPage(-1);else if(dx<-60)flipPage(1)
  }else{
    // 点击翻页
    var pos=getEventPos(e),cx=pos.x-dragState.midX;
    if(cx<0)flipPage(-1);else flipPage(1)
  }
  dragState=null
}

// ═══════════════════════════════════════════
//  键盘
// ═══════════════════════════════════════════
document.addEventListener('keydown',function(e){
  if(!currentBook||isFlipping)return;
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();flipPage(-1)}
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();flipPage(1)}
  if(e.key===' '){e.preventDefault();flipPage(1)}
});

// ═══════════════════════════════════════════
//  拖拽上传
// ═══════════════════════════════════════════
document.addEventListener('dragover',function(e){e.preventDefault()});
document.addEventListener('drop',function(e){e.preventDefault();var f=e.dataTransfer.files[0];
  if(f&&f.name.toLowerCase().endsWith('.txt')){var inp=document.getElementById('fileInput');var dt=new DataTransfer();dt.items.add(f);inp.files=dt.files;handleFileUpload(inp)}
  else if(f)toast('仅支持 .txt',true)
});

// ═══════════════════════════════════════════
//  窗口缩放
// ═══════════════════════════════════════════
var resizeTimer;
window.addEventListener('resize',function(){clearTimeout(resizeTimer);resizeTimer=setTimeout(async function(){
  if(!currentBook||!bookContentCache)return;var cpp=calcCharsPerPage(),bucket=cacheBucket(cpp);
  var cached=await getCachedOffsets(currentBook.id,bucket);
  if(cached){
    var oldLen=pageOffsets.length;pageOffsets=cached;var prog=oldLen>0?currentPageIndex/oldLen:0;
    currentPageIndex=Math.floor(prog*pageOffsets.length/2)*2;if(currentPageIndex>=pageOffsets.length)currentPageIndex=Math.max(0,pageOffsets.length-2);
    currentBook.pageCount=pageOffsets.length;renderSpread();updateProgress();return
  }
  showLoading('重新排版...');var result=paginateFromParas(bookContentCache,bookParaOffsets,cpp);
  await setCachedOffsets(currentBook.id,bucket,result.offsets);var oldLen=pageOffsets.length;pageOffsets=result.offsets;
  var prog=oldLen>0?currentPageIndex/oldLen:0;currentPageIndex=Math.floor(prog*pageOffsets.length/2)*2;
  if(currentPageIndex>=pageOffsets.length)currentPageIndex=Math.max(0,pageOffsets.length-2);
  currentBook.pageCount=pageOffsets.length;renderSpread();updateProgress();hideLoading()
},600)});

init();initDrag();

</script>
