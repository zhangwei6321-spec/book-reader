<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✨ 妖怪迷城 — Yokai Labyrinth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  body { background: #0d0015; overflow: hidden; font-family: 'Noto Sans SC', 'PingFang SC', sans-serif; user-select: none; }

  #game-canvas { display: block; width: 100vw; height: 100vh; cursor: none; image-rendering: pixelated; image-rendering: crisp-edges; }

  #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 5;
    box-shadow: inset 0 0 160px 60px rgba(120,40,80,0.40), inset 0 0 40px 15px rgba(0,0,0,0.18);
    background: radial-gradient(ellipse at center, transparent 60%, rgba(255,140,170,0.06) 100%); }

  /* ---- Top Bar ---- */
  #top-bar {
    position: fixed; top: 12px; left: 0; right: 0; z-index: 10; pointer-events: none;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  #floor-tag {
    background: linear-gradient(135deg, rgba(255,140,170,0.25), rgba(200,100,255,0.20));
    border: 2px solid rgba(255,183,178,0.55);
    border-radius: 20px; padding: 6px 20px;
    color: #FFD4D0; font-size: 14px; font-weight: 700; letter-spacing: 2px;
    backdrop-filter: blur(10px);
    text-shadow: 0 0 16px rgba(255,183,178,0.5), 0 0 4px rgba(255,140,170,0.4);
    animation: tagGlow 2s ease-in-out infinite alternate;
  }
  @keyframes tagGlow { from { box-shadow: 0 0 8px rgba(255,183,178,0.2); } to { box-shadow: 0 0 20px rgba(255,140,170,0.4); } }

  /* ---- Bottom HUD ---- */
  #hud {
    position: fixed; bottom: 20px; left: 0; right: 0; z-index: 10; pointer-events: none;
    display: flex; align-items: flex-end; justify-content: center; gap: 14px;
  }

  /* Character portrait panel */
  #char-panel {
    background: linear-gradient(180deg, rgba(255,140,170,0.18), rgba(100,50,150,0.15));
    border: 2px solid rgba(255,183,178,0.45);
    border-radius: 20px; padding: 8px;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 24px rgba(255,140,170,0.12);
    display: flex; align-items: center; gap: 8px;
  }
  #char-avatar {
    width: 56px; height: 56px; border-radius: 14px;
    border: 2px solid rgba(255,183,178,0.5);
    image-rendering: pixelated;
    box-shadow: 0 0 18px rgba(255,140,170,0.35), 0 0 6px rgba(255,183,178,0.3);
  }
  #char-name { color: #FFD54F; font-size: 13px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255,213,79,0.3); }
  #char-lv { color: #FFB7B2; font-size: 11px; font-weight: 700; }
  #char-hp-text { color: #FF8A80; font-size: 11px; font-weight: 700; }

  /* Stats panel */
  #stats-panel {
    background: linear-gradient(180deg, rgba(255,140,170,0.18), rgba(100,50,150,0.15));
    border: 2px solid rgba(255,183,178,0.45);
    border-radius: 20px; padding: 12px 16px;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 24px rgba(255,140,170,0.12);
    min-width: 200px;
  }
  .stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .stat-icon { font-size: 16px; width: 22px; text-align: center; }
  .stat-label { color: #FFB7B2; font-size: 12px; font-weight: 700; min-width: 32px; }
  .hud-bar {
    flex: 1; height: 14px; border: 2px solid rgba(255,183,178,0.35);
    background: rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; position: relative;
  }
  .hud-fill { height: 100%; border-radius: 6px; transition: width 0.3s ease; }
  .health-fill { background: linear-gradient(90deg, #FF5252, #FF8A80, #FF4081); box-shadow: 0 0 8px rgba(255,82,82,0.4); }
  .stat-val { color: #FFF; font-size: 12px; font-weight: 900; min-width: 36px; text-align: right; text-shadow: 0 0 8px rgba(255,255,255,0.4); }

  #keys-row { display: flex; gap: 8px; margin-top: 6px; }
  .key-badge {
    font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 10px;
    border: 1px solid rgba(255,213,79,0.3);
    background: rgba(255,213,79,0.1); color: #FFD54F;
  }
  .key-badge.active { background: rgba(255,213,79,0.25); border-color: rgba(255,213,79,0.6); box-shadow: 0 0 8px rgba(255,213,79,0.25); }

  #score-display {
    color: #FFD54F; font-size: 13px; font-weight: 900; margin-top: 4px;
    text-shadow: 0 0 10px rgba(255,213,79,0.3);
  }

  /* ---- Minimap ---- */
  #minimap {
    position: fixed; top: 60px; right: 16px;
    border: 2px solid rgba(255,183,178,0.4); border-radius: 12px;
    opacity: 0.82; z-index: 10;
    box-shadow: 0 0 16px rgba(255,183,178,0.2);
  }

  /* ---- Messages ---- */
  #messages { position: fixed; top: 44%; left: 50%; transform: translate(-50%, -50%); z-index: 11; pointer-events: none; text-align: center; }
  .msg {
    color: #FFF; font-size: 18px; font-weight: 700; letter-spacing: 1px;
    text-shadow: 0 0 14px rgba(255,183,178,0.6), 0 0 32px rgba(255,140,170,0.4), 0 2px 4px rgba(0,0,0,0.5);
    margin: 5px 0; animation: msgFade 3s forwards;
    background: rgba(60,20,80,0.6); border: 1px solid rgba(255,183,178,0.25);
    border-radius: 14px; padding: 6px 18px;
    backdrop-filter: blur(6px);
  }
  @keyframes msgFade { 0%{opacity:1;transform:translateY(0) scale(1)} 60%{opacity:1} 100%{opacity:0;transform:translateY(-24px) scale(0.92)} }

  /* ---- Start/End Overlay ---- */
  #overlay {
    position: fixed; inset: 0; z-index: 20;
    background: linear-gradient(160deg, rgba(13,0,21,0.96), rgba(40,15,60,0.96));
    display: flex; align-items: center; justify-content: center; flex-direction: column;
  }
  #overlay.hidden { display: none; }

  #overlay h1 {
    font-size: 54px;
    background: linear-gradient(135deg, #FFB7B2, #FF8A80, #FF4081, #E040FB, #7C4DFF);
    animation: titleShine 3s ease-in-out infinite alternate;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px; letter-spacing: 8px; font-weight: 900;
    filter: drop-shadow(0 0 20px rgba(255,64,129,0.4));
  }
  #overlay h2 {
    font-size: 26px; color: #FFB7B2; font-weight: 700; margin-bottom: 16px; letter-spacing: 10px;
    text-shadow: 0 0 24px rgba(255,183,178,0.4);
  }
  #overlay .sub {
    font-size: 15px; color: #C8B8E8; margin-bottom: 40px; max-width: 500px; text-align: center; line-height: 2; font-weight: 400;
  }
  #overlay .stat { font-size: 24px; color: #FFD54F; margin-bottom: 32px; font-weight: 700; text-shadow: 0 0 18px rgba(255,213,79,0.4); }

  .btn {
    font-family: 'Noto Sans SC', sans-serif; font-size: 22px; font-weight: 700;
    padding: 14px 52px; border: none; border-radius: 30px;
    background: linear-gradient(135deg, #FF8A80, #FF4081);
    color: #FFF; cursor: pointer; letter-spacing: 3px;
    transition: all 0.3s ease;
    box-shadow: 0 6px 28px rgba(255,64,129,0.35);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(255,64,129,0.5); }
  .btn:active { transform: translateY(0); }

  .controls-info { margin-top: 44px; font-size: 13px; color: #8B6FB8; text-align: center; line-height: 2.4; font-weight: 400; }
  .controls-info kbd {
    border: 1px solid rgba(255,183,178,0.3); padding: 3px 10px; border-radius: 8px;
    background: rgba(255,183,178,0.1); color: #FFB7B2; font-family: 'Noto Sans SC', sans-serif; font-weight: 700;
  }

  /* ---- Floor Transition ---- */
  #floor-name {
    position: fixed; top: 46%; left: 50%; transform: translate(-50%, -50%); z-index: 15; pointer-events: none;
    color: #FFF; font-size: 40px; font-weight: 900; letter-spacing: 6px;
    text-shadow: 0 0 40px rgba(255,140,170,0.7), 0 0 20px rgba(255,183,178,0.6), 0 0 60px rgba(200,100,255,0.3);
    animation: floorIn 2.6s forwards;
    background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(60,20,80,0.3));
    padding: 8px 40px; border-radius: 16px; border: 1px solid rgba(255,183,178,0.2);
    backdrop-filter: blur(4px);
  }
  @keyframes floorIn { 0%{opacity:0;transform:translate(-50%,-50%) scale(1.4)} 10%{opacity:1;transform:translate(-50%,-50%) scale(1)} 70%{opacity:1} 100%{opacity:0} }
  @keyframes titleShine { from { filter: drop-shadow(0 0 20px rgba(255,64,129,0.4)) brightness(1); } to { filter: drop-shadow(0 0 30px rgba(255,64,129,0.6)) brightness(1.1); } }

  /* ---- Mobile controls ---- */
  #mobile-controls { position: fixed; bottom: 120px; left: 0; right: 0; z-index: 12; display: none; justify-content: center; gap: 18px; }
  .mbtn {
    width: 56px; height: 56px; border: 2px solid rgba(255,183,178,0.35);
    background: rgba(255,183,178,0.1); color: #FFB7B2; font-size: 24px;
    border-radius: 18px; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    backdrop-filter: blur(6px);
  }
  .mbtn:active { background: rgba(255,183,178,0.25); border-color: rgba(255,183,178,0.6); }
  .mbtn.use-btn { width: 62px; background: rgba(255,140,170,0.2); border-color: rgba(255,140,170,0.5); font-size: 20px; }

  @media (max-width: 768px) {
    #mobile-controls { display: flex; }
    #hud { bottom: 160px; }
    #minimap { top: 12px; right: 50px; width: 70px; height: 70px; display: none; }
  }

  #floor-name .exit-hint {
    display: block;
    font-size: 16px;
    margin-top: 8px;
    opacity: 0.9;
    animation: exitPulse 1s ease-in-out infinite alternate;
  }
  @keyframes exitPulse {
    from { opacity: 0.6; transform: scale(1); }
    to { opacity: 1; transform: scale(1.05); }
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>
<canvas id="minimap" width="140" height="140"></canvas>
<div id="vignette"></div>

<div id="top-bar"><div id="floor-tag"></div></div>

<div id="hud">
  <div id="char-panel" style="display:none">
    <canvas id="char-avatar" width="56" height="56"></canvas>
    <div>
      <div id="char-name">✨ 灵梦</div>
      <div id="char-lv">Lv.1 见习巫女</div>
      <div id="char-hp-text"></div>
    </div>
  </div>
  <div id="stats-panel">
    <div class="stat-row">
      <span class="stat-icon">❤️</span>
      <span class="stat-label">HP</span>
      <div class="hud-bar"><div id="hud-health" class="hud-fill health-fill" style="width:100%"></div></div>
      <span class="stat-val" id="hud-hp-val">100/100</span>
    </div>
    <div id="keys-row">
      <span class="key-badge" id="key-gold">🔑 金 0</span>
      <span class="key-badge" id="key-silver">🔑 银 0</span>
      <span class="key-badge" id="key-crystal">🔑 晶 0</span>
    </div>
    <div id="score-display">💰 0 金币</div>
  </div>
</div>

<div id="messages"></div>

<div id="overlay">
  <h1>妖怪迷城</h1>
  <h2>YOKAI LABYRINTH</h2>
  <p class="sub">
    🌸 你将扮演见习巫女「灵梦」，深入妖怪盘踞的古堡。<br>
    收集钥匙、击败妖怪，找到通往下一层的传送门！<br>
    小心别被妖怪包围哦～ ✨
  </p>
  <button class="btn" onclick="startGame()">进 入 迷 城</button>
  <div class="controls-info">
    <kbd>↑ ↓ ← →</kbd> 移动 &nbsp;|&nbsp;
    
    <kbd>E</kbd> 开门<br>
    点击画面锁定鼠标
  </div>
</div>

<div id="mobile-controls">
  <div class="mbtn" id="m-up">▲</div>
  <div class="mbtn" id="m-left">◀</div>
  <div class="mbtn use-btn" id="m-use">🔑</div>
  <div class="mbtn" id="m-right">▶</div>
  <div class="mbtn" id="m-down">▼</div>
</div>

<script>
// ============================================================
// Raycasting Engine — Anime/Manga Style
// Cel-shading, outlines, cherry blossoms, anime sky
// ============================================================

const RENDER_W = 640;
const RENDER_H = 400;

class RaycastEngine {
  constructor(map) {
    this.map = map;
    this.mapW = map[0].length;
    this.mapH = map.length;
    this.screenW = RENDER_W;
    this.screenH = RENDER_H;
    this.textures = {};
    this.particles = [];
    this._generateTextures();
    this._initParticles();
    this.frameCount = 0;
  }

  // ---- Cel-shading brightness ----
  static celShade(dist, torchMul) {
    const d = dist / torchMul;
    // Anime posterization: 5 distinct shade bands for hand-drawn look
    if (d < 2.2) return 1.0;
    if (d < 4.5) return 0.82;
    if (d < 8) return 0.60;
    if (d < 14) return 0.35;
    if (d < 22) return 0.18;
    return 0.08;
  }

  // ---- Cherry blossom particles ----
  _initParticles() {
    this.particles = [];
    for (let i = 0; i < 120; i++) {
      const type = Math.random() < 0.15 ? 'sparkle' : (Math.random() < 0.15 ? 'leaf' : 'petal');
      const sz = type === 'sparkle' ? 1 + Math.random() * 2 : (type === 'leaf' ? 2 + Math.random() * 4 : 3 + Math.random() * 5);
      this.particles.push({
        x: Math.random() * this.screenW,
        y: Math.random() * this.screenH * 0.7,
        vx: (Math.random() - 0.5) * (0.4 + Math.random() * 0.8),
        vy: 0.2 + Math.random() * 1.0,
        size: sz,
        alpha: 0.2 + Math.random() * 0.8,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.04,
        life: 200 + Math.random() * 700,
        type: type,
      });
    }
  }

  updateParticles() {
    for (const p of this.particles) {
      p.x += p.vx + Math.sin(p.life * 0.015 + p.x * 0.1) * 0.4;
      p.y += p.vy;
      p.rotation += p.rotSpeed;
      p.life--;
      if (p.life <= 0 || p.y > this.screenH + 20 || p.x < -20 || p.x > this.screenW + 20) {
        p.x = Math.random() * this.screenW;
        p.y = -10 - Math.random() * 100;
        p.vx = (Math.random() - 0.5) * (0.4 + Math.random() * 0.8);
        p.vy = 0.2 + Math.random() * 1.0;
        p.life = 200 + Math.random() * 700;
      }
    }
  }

  // ---- Procedural anime-style textures ----
  _generateTextures() {
    const texSize = 64;
    const types = [
      { name: 'stone', c1: '#E8DCC8', c2: '#D4C4A8', c3: '#C8B898', noise: 0.04 },
      { name: 'brick', c1: '#F5D6C3', c2: '#E8C4A8', c3: '#D4A888', noise: 0.03, brick: true },
      { name: 'wood', c1: '#FAEBD7', c2: '#F0DCC0', c3: '#E8D0B0', noise: 0.06, grain: true },
      { name: 'moss', c1: '#C8E6C9', c2: '#A5D6A7', c3: '#81C784', noise: 0.05 },
      { name: 'door_locked', c1: '#FF8A80', c2: '#FF5252', c3: '#D32F2F', noise: 0.04, torii: true },
      { name: 'door_open', c1: '#A5D6A7', c2: '#81C784', c3: '#4CAF50', noise: 0.04 },
      { name: 'portal', c1: '#E1BEE7', c2: '#CE93D8', c3: '#BA68C8', noise: 0.06, portal: true },
      { name: 'bars', c1: '#FFE0B2', c2: '#FFCC80', c3: '#FFB74D', noise: 0.03, bars: true },
    ];

    let s = 42;
    const rand = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };

    for (const t of types) {
      const c = document.createElement('canvas');
      c.width = c.height = texSize;
      const ctx = c.getContext('2d');
      const img = ctx.createImageData(texSize, texSize);
      const d = img.data;
      const [r1, g1, b1] = this._hex(t.c1);
      const [r2, g2, b2] = this._hex(t.c2);
      const [r3, g3, b3] = this._hex(t.c3);

      for (let y = 0; y < texSize; y++) {
        for (let x = 0; x < texSize; x++) {
          const i = (y * texSize + x) * 4;
          let rr = r1, gg = g1, bb = b1;
          if (t.brick) {
            const by = y % 8, bx = x % 16;
            if (by < 1 || bx < 1) { rr = r3; gg = g3; bb = b3; }
            else { rr = r2; gg = g2; bb = b2; rr += Math.floor(rand() * 10 - 5); gg += Math.floor(rand() * 10 - 5); bb += Math.floor(rand() * 10 - 5); }
          } else if (t.grain) {
            rr = r2; gg = g2; bb = b2;
            const grain = Math.sin(x * 0.3 + y * 0.15) * 8;
            rr += grain; gg += grain * 0.7; bb += grain * 0.3;
            if (Math.abs(x - 32) < 1.5 || Math.abs(y - 32) < 1.5) { rr = Math.min(255, rr + 20); gg = Math.min(255, gg + 20); bb = Math.min(255, bb + 20); }
          } else if (t.portal) {
            const pulse = Math.sin((x + y) * 0.4) * 20;
            rr = r2; gg = g2; bb = b2;
            bb += pulse * 0.5; rr += pulse * 0.3; gg += pulse * 0.2;
            const dx = x - 32, dy = y - 32, dist = Math.sqrt(dx*dx+dy*dy);
            if (dist > 26 && dist < 30) { rr = 255; gg = 200; bb = 255; }
            if (dist > 14 && dist < 17) { rr = 220; gg = 180; bb = 255; }
          } else if (t.bars) {
            if ((x % 8) < 2 || (y % 8) < 2) { rr = r3; gg = g3; bb = b3; }
          } else if (t.torii) {
            if (y < 10 || y > 54 || (y > 20 && y < 28) || (y > 36 && y < 44)) { rr = r2; gg = g2; bb = b2; }
            if (x < 12 || x > 52) { rr = r1; gg = g1; bb = b1; }
          }
          const n = rand() * t.noise * 255;
          d[i]   = Math.max(0, Math.min(255, rr + n));
          d[i+1] = Math.max(0, Math.min(255, gg + n));
          d[i+2] = Math.max(0, Math.min(255, bb + n));
          d[i+3] = 255;
        }
      }
      ctx.putImageData(img, 0, 0);
      this.textures[t.name] = { canvas: c, ctx, data: img };
    }
  }

  _hex(h) {
    h = h.replace('#','');
    return [parseInt(h.substring(0,2),16), parseInt(h.substring(2,4),16), parseInt(h.substring(4,6),16)];
  }

  // ---- DDA Raycasting ----
  castRays(player) {
    const SW = this.screenW, SH = this.screenH;
    const zBuffer = new Float64Array(SW);
    const walls = new Array(SW);

    for (let x = 0; x < SW; x++) {
      const cameraX = 2 * x / SW - 1;
      const rayDX = player.dirX + player.planeX * cameraX;
      const rayDY = player.dirY + player.planeY * cameraX;

      let mapX = Math.floor(player.x), mapY = Math.floor(player.y);
      let sideDistX, sideDistY;
      let deltaDistX = Math.abs(1 / (rayDX || 1e-12));
      let deltaDistY = Math.abs(1 / (rayDY || 1e-12));
      let stepX, stepY, side, hit = 0;

      if (rayDX < 0) { stepX = -1; sideDistX = (player.x - mapX) * deltaDistX; }
      else { stepX = 1; sideDistX = (mapX + 1.0 - player.x) * deltaDistX; }

      if (rayDY < 0) { stepY = -1; sideDistY = (player.y - mapY) * deltaDistY; }
      else { stepY = 1; sideDistY = (mapY + 1.0 - player.y) * deltaDistY; }

      while (hit === 0) {
        if (sideDistX < sideDistY) {
          sideDistX += deltaDistX; mapX += stepX; side = 0;
        } else {
          sideDistY += deltaDistY; mapY += stepY; side = 1;
        }
        if (mapY < 0 || mapY >= this.mapH || mapX < 0 || mapX >= this.mapW) { hit = -1; }
        else if (this.map[mapY][mapX] > 0 && this.map[mapY][mapX] !== 6) { hit = this.map[mapY][mapX]; }
      }

      let perpWallDist;
      if (side === 0) perpWallDist = (mapX - player.x + (1 - stepX) / 2) / (rayDX || 1e-12);
      else perpWallDist = (mapY - player.y + (1 - stepY) / 2) / (rayDY || 1e-12);

      zBuffer[x] = perpWallDist;
      const lineHeight = Math.floor(SH / perpWallDist);
      const drawStart = -lineHeight / 2 + SH / 2 + player.pitch * 100;
      const drawEnd = lineHeight / 2 + SH / 2 + player.pitch * 100;

      // Wall hit X coordinate (for texturing)
      let wallX;
      if (side === 0) wallX = player.y + perpWallDist * rayDY;
      else wallX = player.x + perpWallDist * rayDX;
      wallX -= Math.floor(wallX);

      walls[x] = {
        hit, mapX, mapY, side, perpWallDist,
        lineHeight, drawStart, drawEnd, wallX
      };
    }
    return { walls, zBuffer };
  }

  // ---- Main Render Frame ----
  renderFrame(ctx, player, sprites = []) {
    const SW = this.screenW, SH = this.screenH;
    this.updateParticles();

    const { walls, zBuffer } = this.castRays(player);

    // Create image data for the whole frame
    const imgData = ctx.createImageData(SW, SH);
    const d = imgData.data;

    // ---- Draw anime sky (dramatic multi-layer gradient) ----
    const horizonY = Math.floor(SH / 2 + 5);
    for (let y = 0; y < horizonY; y++) {
      const t = y / horizonY;
      // Deep space purple -> twilight blue -> warm sunset orange -> bright horizon
      let r, g, b;
      if (t < 0.35) {
        // Deep purple/blue space
        const st = t / 0.35;
        r = Math.floor(25 + 40 * st);
        g = Math.floor(15 + 35 * st);
        b = Math.floor(70 + 60 * st);
      } else if (t < 0.65) {
        // Twilight transition
        const st = (t - 0.35) / 0.30;
        r = Math.floor(65 + 100 * st);
        g = Math.floor(50 + 70 * st);
        b = Math.floor(130 + 50 * st);
      } else if (t < 0.85) {
        // Sunset warm glow
        const st = (t - 0.65) / 0.20;
        r = Math.floor(165 + 60 * st);
        g = Math.floor(120 + 60 * st);
        b = Math.floor(180 + 10 * st - 30 * st * st);
      } else {
        // Bright horizon
        const st = (t - 0.85) / 0.15;
        r = Math.floor(225 + 30 * st);
        g = Math.floor(180 + 50 * st);
        b = Math.floor(190 + 20 * st);
      }
      for (let x = 0; x < SW; x++) {
        const idx = (y * SW + x) * 4;
        d[idx] = r; d[idx+1] = g; d[idx+2] = b; d[idx+3] = 255;
      }
    }

    // ---- Draw anime dungeon floor (checkered pattern) ----
    for (let y = Math.floor(SH / 2); y < SH; y++) {
      const t = (y - SH/2) / (SH/2);
      const fog = Math.max(0.15, 1 - t * 0.95);
      for (let x = 0; x < SW; x++) {
        const idx = (y * SW + x) * 4;
        // Create perspective checkered pattern
        const vx = (x - SW/2) / (y - SH/2 + 1);
        const vy = 1 / (y - SH/2 + 1);
        const checkX = Math.floor(vx * 60 + player.x * 8);
        const checkY = Math.floor(vy * 60 + player.y * 8);
        const isCheck = (checkX + checkY) % 2 === 0;
        const baseR = isCheck ? 160 : 110;
        const baseG = isCheck ? 120 : 80;
        const baseB = isCheck ? 90 : 60;
        d[idx]   = Math.floor(baseR * fog);
        d[idx+1] = Math.floor(baseG * fog);
        d[idx+2] = Math.floor(baseB * fog);
        d[idx+3] = 255;
      }
    }

    // ---- Draw walls with cel-shading + outlines ----
    for (let x = 0; x < SW; x++) {
      const w = walls[x];
      if (!w || w.hit <= 0) continue;

      const { hit, side, perpWallDist, lineHeight, drawStart, drawEnd, wallX } = w;

      // Get texture
      const texNames = [null, 'stone', 'brick', 'wood', 'moss', 'door_locked', null, 'portal', 'bars'];
      const texName = texNames[hit] || 'stone';
      const tex = this.textures[texName];
      if (!tex) continue;

      // Get cel-shading level
      const shade = RaycastEngine.celShade(perpWallDist, 1.0);
      const sideShade = side === 1 ? 0.85 : 1.0;
      const finalShade = shade * sideShade;

      // Check if this is a wall edge (for outline effect)
      const isEdge = (perpWallDist < 2.0);

      let texX = Math.floor(wallX * 64);
      const texCanvas = tex.canvas;
      const texCtx = texCanvas.getContext('2d');
      const texData = texCtx.getImageData(texX % 64, 0, 1, 64).data;

      for (let y = Math.max(0, Math.ceil(drawStart)); y < Math.min(SH, drawEnd); y++) {
        const idx = (y * SW + x) * 4;
        const texY = Math.floor(((y - drawStart) / lineHeight) * 64);
        const ti = (texY * 1) * 4;

        const tr = texData[ti], tg = texData[ti+1], tb = texData[ti+2];

        // Apply manga-style cel-shading with posterization
        let shade = finalShade;
        // Posterize to fewer levels for hand-drawn look
        if (shade > 0.85) shade = 0.95;
        else if (shade > 0.65) shade = 0.75;
        else if (shade > 0.40) shade = 0.50;
        else if (shade > 0.20) shade = 0.28;
        else shade = 0.12;
        
        let cr = Math.floor(tr * shade);
        let cg = Math.floor(tg * shade);
        let cb = Math.floor(tb * shade);

        // Add dark outline at wall edges for anime cel-shading effect
        if (isEdge && (y < drawStart + 5 || y > drawEnd - 5)) {
          cr = Math.floor(cr * 0.5);
          cg = Math.floor(cg * 0.5);
          cb = Math.floor(cb * 0.5);
        }
        
        // Add subtle manga horizontal line at shade transitions
        if (y > drawStart + 2 && y < drawEnd - 2 && 
            ((y - drawStart) % Math.floor(lineHeight / 5) < 2)) {
          cr = Math.floor(cr * 0.85);
          cg = Math.floor(cg * 0.85);
          cb = Math.floor(cb * 0.85);
        }

        d[idx]   = Math.max(0, Math.min(255, cr));
        d[idx+1] = Math.max(0, Math.min(255, cg));
        d[idx+2] = Math.max(0, Math.min(255, cb));
        d[idx+3] = 255;
      }

      // Draw manga-style wall edge outline (thick dark lines)
      if (drawStart > 0 && drawStart < SH) {
        const ey = Math.floor(drawStart);
        for (let ol = 0; ol < 3; ol++) {
          const oy = ey + ol;
          if (oy >= 0 && oy < SH) {
            for (let ox = -2; ox <= 2; ox++) {
              const ex = x + ox;
              if (ex >= 0 && ex < SW) {
                const idx = (oy * SW + ex) * 4;
                const alpha = ol === 0 ? 1.0 : (ol === 1 ? 0.6 : 0.25);
                d[idx]   = Math.floor(d[idx] * (1-alpha) + 15 * alpha);
                d[idx+1] = Math.floor(d[idx+1] * (1-alpha) + 8 * alpha);
                d[idx+2] = Math.floor(d[idx+2] * (1-alpha) + 20 * alpha);
              }
            }
          }
        }
      }
    }

    // ---- Draw Anime Particles (cherry blossoms, leaves, sparkles) ----
    for (const p of this.particles) {
      const px = Math.floor(p.x), py = Math.floor(p.y);
      if (px < 1 || px >= SW - 1 || py < 1 || py >= SH - 1) continue;

      if (py < SH * 0.70) {
        const s = p.size;
        const alpha = p.alpha;
        let pr, pg, pb;
        
        if (p.type === 'sparkle') {
          pr = 255; pg = 240; pb = 200; // Golden sparkle
        } else if (p.type === 'leaf') {
          pr = 180; pg = 220; pb = 150; // Green leaf
        } else {
          pr = 255; pg = 185; pb = 200; // Pink petal (default)
        }
        
        for (let dy = -Math.ceil(s); dy <= Math.ceil(s); dy++) {
          for (let dx = -Math.ceil(s); dx <= Math.ceil(s); dx++) {
            const nx = px + dx, ny = py + dy;
            if (nx < 0 || nx >= SW || ny < 0 || ny >= SH) continue;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < s) {
              const ni = (ny * SW + nx) * 4;
              const blend = alpha * Math.max(0, 1 - dist/s);
              d[ni]   = Math.floor(d[ni] * (1-blend) + pr * blend);
              d[ni+1] = Math.floor(d[ni+1] * (1-blend) + pg * blend);
              d[ni+2] = Math.floor(d[ni+2] * (1-blend) + pb * blend);
            }
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);

    // ---- Render Sprites (Enemies, Items) ----
    const sortedSprites = [...sprites].sort((a, b) => {
      const dA = (a.x - player.x) ** 2 + (a.y - player.y) ** 2;
      const dB = (b.x - player.x) ** 2 + (b.y - player.y) ** 2;
      return dB - dA;
    });

    for (const spr of sortedSprites) {
      let sx = spr.x - player.x, sy = spr.y - player.y;
      const invDet = 1.0 / (player.planeX * player.dirY - player.dirX * player.planeY);
      const transformX = invDet * (player.dirY * sx - player.dirX * sy);
      const transformY = invDet * (-player.planeY * sx + player.planeX * sy);
      if (transformY <= 0.1) continue;

      const sprScreenX = Math.floor((SW / 2) * (1 + transformX / transformY));
      const sprH = Math.abs(Math.floor(SH / transformY)) * 0.8;
      const sprW = sprH;
      const dsY = Math.floor(-sprH / 2 + SH / 2 + player.pitch * 150);
      const dsX = Math.floor(sprScreenX - sprW / 2);

      const stripeW = Math.max(1, Math.floor(sprW / 40));
      for (let stripe = 0; stripe < sprW; stripe += stripeW) {
        const texx = stripe / sprW;
        if (stripe + dsX >= 0 && stripe + dsX < SW && transformY < zBuffer[stripe + dsX]) {
          for (let yp = 0; yp < sprH; yp++) {
            const d2 = dsY + yp;
            if (d2 < 0 || d2 >= SH) continue;
            const texy = yp / sprH;
            const [cr, cg, cb] = this._sprColor(spr, texx, texy);
            if (cr === -1) continue;
            const idx2 = (d2 * SW + stripe + dsX) * 4;
            d[idx2] = cr; d[idx2+1] = cg; d[idx2+2] = cb; d[idx2+3] = 255;
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);
  }

  _sprColor(spr, nx, ny) {
    const cx = nx - 0.5, cy = ny - 0.5, d = Math.sqrt(cx * cx + cy * cy);

    switch (spr.type) {
      case 'ghost': {
        if (d > 0.44) return [-1,-1,-1];
        // Outlined chibi style
        if (d > 0.40) return [50,25,40];
        if (ny < 0.15 && d > 0.15) {
          if (Math.abs(cx) > 0.08 && Math.abs(cx) < 0.22) {
            if (spr.variant==='red') return [220,80,60];
            if (spr.variant==='boss') return [180,40,180];
            return [80,160,220];
          }
        }
        const ef = Math.max(0, 1 - d / 0.44);
        if (ny > 0.35 && ny < 0.50) {
          if (Math.abs(nx - 0.28) < 0.08 && ny > 0.38 && ny < 0.46) return [255,180,180];
          if (Math.abs(nx - 0.72) < 0.08 && ny > 0.38 && ny < 0.46) return [255,180,180];
        }
        if (ny > 0.22 && ny < 0.38) {
          const leftEye = Math.abs(nx - 0.35) < 0.07 && ny > 0.26 && ny < 0.36;
          const rightEye = Math.abs(nx - 0.65) < 0.07 && ny > 0.26 && ny < 0.36;
          if (leftEye || rightEye) {
            if (Math.abs(nx - (leftEye ? 0.35 : 0.65)) < 0.06 && Math.abs(ny - 0.31) < 0.04) return [255,255,255];
            if (Math.abs(nx - (leftEye ? 0.35 : 0.65)) < 0.03 && Math.abs(ny - 0.31) < 0.03) return [30,30,30];
            if (Math.abs(nx - (leftEye ? 0.33 : 0.63)) < 0.015 && Math.abs(ny - 0.29) < 0.02) return [255,255,255];
            return [60,40,40];
          }
        }
        if (ny > 0.44 && ny < 0.52 && Math.abs(nx - 0.5) < 0.1) {
          const mouthY = 0.48 + Math.sin(Math.abs(nx - 0.5) * 10) * 0.02;
          if (Math.abs(ny - mouthY) < 0.015) return [180,100,100];
        }
        const g = Math.floor(180 + 75 * ef);
        if (spr.variant==='red') return [g, Math.floor(g*0.55), Math.floor(g*0.55)];
        if (spr.variant==='boss') return [Math.floor(g*0.6), Math.floor(g*0.4), g];
        return [Math.floor(g*0.6), Math.floor(g*0.85), g];
      }

      case 'key': {
        if (d > 0.32) return [-1,-1,-1];
        if (d > 0.28) return [80,80,80];
        if (d < 0.06) {
          if (Math.abs(cx) < 0.03 && Math.abs(cy) < 0.03) return [255,255,200];
          return [255,255,150];
        }
        if (ny < 0.25 && d > 0.1 && d < 0.2) {
          if (spr.subtype==='gold') return [255,200,50];
          if (spr.subtype==='silver') return [200,200,210];
          return [120,200,255];
        }
        if (spr.subtype==='gold') return [255,215,0];
        if (spr.subtype==='silver') return [180,185,195];
        return [100,180,255];
      }

      case 'health': {
        if (d > 0.28) return [-1,-1,-1];
        const hx = Math.abs(cx), hy = cy + 0.05;
        const heartVal = Math.pow(hx*hx + hy*hy - 1, 3) - hx*hx * hy*hy*hy;
        if (heartVal < 0) return [255,100,130];
        return [-1,-1,-1];
      }

      case 'torch': {
        if (d > 0.3) return [-1,-1,-1];
        if (d < 0.08) return [255,240,100];
        if (d < 0.15) return [255,200,50];
        const flicker = 0.4 + Math.random() * 0.6;
        return [Math.floor(255*flicker), Math.floor(200*flicker), Math.floor(80*flicker)];
      }

      case 'coin': {
        if (d > 0.20) return [-1,-1,-1];
        if (d < 0.05) return [255,255,180];
        return [255,220,50];
      }

      case 'exit': {
        if (d > 0.40) return [-1,-1,-1];
        const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.006);
        const angle = Math.atan2(cy, cx);
        const swirl = (d * 5 + angle / Math.PI) % 1;
        if (swirl < 0.3) return [Math.floor(255*pulse), Math.floor(200*pulse), 255];
        if (swirl < 0.5) return [255, Math.floor(220*pulse), Math.floor(255*pulse)];
        return [Math.floor(200*pulse), Math.floor(150*pulse), 255];
      }

      default: return [255,0,255];
    }
  }

  // ---- Line of sight ----
  hasLineOfSight(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const steps = Math.ceil(Math.max(Math.abs(dx), Math.abs(dy)) * 8);
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const mx = Math.floor(x1 + dx * t), my = Math.floor(y1 + dy * t);
      if (my < 0 || my >= this.mapH || mx < 0 || mx >= this.mapW) return false;
      const c = this.map[my][mx];
      if (c > 0 && c !== 6) return false;
    }
    return true;
  }

  static get renderW() { return RENDER_W; }
  static get renderH() { return RENDER_H; }
}

// Game State
// ============================================================

class Game {
  constructor() {
    this.currentFloor = 0;
    this.health = 100;
    this.maxHealth = 100;
    this.keys = {};
    this.score = 0;
    this.torchTimer = 0;
    this.invincibleTimer = 0;
    this.gameOver = false;
    this.gameWon = false;
    this.messages = [];
    this.messageTimer = 0;
    this.floorTransition = false;
    this.transitionTimer = 0;

    this._loadFloor(0);
  }

  _loadFloor(index) {
    if (index >= FLOORS.length) {
      this.gameWon = true;
      return;
    }
    const floor = FLOORS[index];
    this.currentFloor = index;
    this.map = floor.map.map(row => [...row]);
    this.engine = new RaycastEngine(this.map);

    // Player
    this.player = {
      x: floor.playerStart.x,
      y: floor.playerStart.y,
      dirX: Math.cos(floor.playerStart.angle),
      dirY: Math.sin(floor.playerStart.angle),
      planeX: -Math.sin(floor.playerStart.angle) * 0.66,
      planeY: Math.cos(floor.playerStart.angle) * 0.66,
      angle: floor.playerStart.angle,
      pitch: 0,
      moveSpeed: 3.5,
      rotSpeed: 2.5,
    };

    // Enemies (deep copy)
    this.enemies = floor.enemies.map(e => ({
      ...e,
      alive: true,
      patrolIndex: 0,
      patrolDir: 1,
      damageTimer: 0,
      x: e.x, y: e.y
    }));

    // Items (collectible)
    this.items = floor.items.map(i => ({
      ...i,
      collected: false
    }));

    // Doors
    this.doors = floor.doors.map(d => ({ ...d, open: false }));

    // Exit
    this.exit = floor.exit;

    // Reset keys for each floor (or carry over? Let's reset)
    this.keys = {};

    this.addMessage(`🏚️ ${floor.name}`, 180);
    this.floorTransition = true;
    this.transitionTimer = 90; // 1.5 seconds at 60fps
  }

  // ---- Update ----
  update(dt, input) {
    if (this.gameOver || this.gameWon) return;
    if (this.floorTransition) {
      this.transitionTimer--;
      if (this.transitionTimer <= 0) this.floorTransition = false;
      return;
    }

    // Timers
    if (this.torchTimer > 0) this.torchTimer -= dt;
    if (this.invincibleTimer > 0) this.invincibleTimer -= dt;
    if (this.messageTimer > 0) {
      this.messageTimer -= dt;
      if (this.messageTimer <= 0) this.messages.shift();
    }

    // Player movement
    this._movePlayer(dt, input);
    // Player interaction (E key)
    if (input.use && !input._prevUse) {
      this._interact();
    }
    input._prevUse = input.use;

    // Update enemies
    this._updateEnemies(dt);

    // Check item pickup
    this._checkItemPickup();

    // Check exit
    this._checkExit();
  }

  _movePlayer(dt, input) {
    const p = this.player;
    const moveStep = p.moveSpeed * dt;
    const rotStep = p.rotSpeed * dt;

    // Rotation
    if (input.left) {
      const cos = Math.cos(-rotStep), sin = Math.sin(-rotStep);
      const oldDirX = p.dirX, oldPlaneX = p.planeX;
      p.dirX = p.dirX * cos - p.dirY * sin;
      p.dirY = oldDirX * sin + p.dirY * cos;
      p.planeX = p.planeX * cos - p.planeY * sin;
      p.planeY = oldPlaneX * sin + p.planeY * cos;
    }
    if (input.right) {
      const cos = Math.cos(rotStep), sin = Math.sin(rotStep);
      const oldDirX = p.dirX, oldPlaneX = p.planeX;
      p.dirX = p.dirX * cos - p.dirY * sin;
      p.dirY = oldDirX * sin + p.dirY * cos;
      p.planeX = p.planeX * cos - p.planeY * sin;
      p.planeY = oldPlaneX * sin + p.planeY * cos;
    }

    // Mouse looking
    if (input.mouseX !== undefined && input.mouseX !== 0) {
      const mRot = input.mouseX * 0.003;
      const cos = Math.cos(mRot), sin = Math.sin(mRot);
      const oldDirX = p.dirX, oldPlaneX = p.planeX;
      p.dirX = p.dirX * cos - p.dirY * sin;
      p.dirY = oldDirX * sin + p.dirY * cos;
      p.planeX = p.planeX * cos - p.planeY * sin;
      p.planeY = oldPlaneX * sin + p.planeY * cos;
    }

    // Forward/backward
    if (input.forward) {
      const newX = p.x + p.dirX * moveStep;
      const newY = p.y + p.dirY * moveStep;
      if (this._canMoveTo(newX, p.y)) p.x = newX;
      if (this._canMoveTo(p.x, newY)) p.y = newY;
    }
    if (input.backward) {
      const newX = p.x - p.dirX * moveStep;
      const newY = p.y - p.dirY * moveStep;
      if (this._canMoveTo(newX, p.y)) p.x = newX;
      if (this._canMoveTo(p.x, newY)) p.y = newY;
    }

    // Strafe
    if (input.strafeLeft) {
      const newX = p.x - p.planeX * moveStep * 0.6;
      const newY = p.y - p.planeY * moveStep * 0.6;
      if (this._canMoveTo(newX, p.y)) p.x = newX;
      if (this._canMoveTo(p.x, newY)) p.y = newY;
    }
    if (input.strafeRight) {
      const newX = p.x + p.planeX * moveStep * 0.6;
      const newY = p.y + p.planeY * moveStep * 0.6;
      if (this._canMoveTo(newX, p.y)) p.x = newX;
      if (this._canMoveTo(p.x, newY)) p.y = newY;
    }
  }

  _canMoveTo(x, y) {
    const margin = 0.2;
    const checks = [
      [x + margin, y + margin], [x - margin, y + margin],
      [x + margin, y - margin], [x - margin, y - margin]
    ];
    for (const [cx, cy] of checks) {
      const mx = Math.floor(cx), my = Math.floor(cy);
      if (my < 0 || my >= this.map.length || mx < 0 || mx >= this.map[0].length) return false;
      const cell = this.map[my][mx];
      if (cell > 0 && cell !== 6) return false; // Wall or closed door
    }
    return true;
  }

  _updateEnemies(dt) {
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;

      const dx = this.player.x - enemy.x;
      const dy = this.player.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Chase player if close enough and visible
      const chaseRange = enemy.boss ? 12 : 8;
      if (dist < chaseRange && this.engine.hasLineOfSight(enemy.x, enemy.y, this.player.x, this.player.y)) {
        // Chase
        const speed = (enemy.boss ? 1.5 : enemy.variant === 'red' ? 1.2 : 0.8) * dt;
        const nx = enemy.x + (dx / dist) * speed;
        const ny = enemy.y + (dy / dist) * speed;
        if (this._canMoveTo(nx, ny)) {
          enemy.x = nx; enemy.y = ny;
        } else if (this._canMoveTo(nx, enemy.y)) {
          enemy.x = nx;
        } else if (this._canMoveTo(enemy.x, ny)) {
          enemy.y = ny;
        }
      } else if (enemy.patrol && enemy.patrol.length > 0) {
        // Patrol
        const target = enemy.patrol[enemy.patrolIndex];
        const tdx = target.x + 0.5 - enemy.x;
        const tdy = target.y + 0.5 - enemy.y;
        const tdist = Math.sqrt(tdx * tdx + tdy * tdy);
        if (tdist < 0.3) {
          enemy.patrolIndex += enemy.patrolDir;
          if (enemy.patrolIndex >= enemy.patrol.length) {
            enemy.patrolIndex = enemy.patrol.length - 2;
            enemy.patrolDir = -1;
          } else if (enemy.patrolIndex < 0) {
            enemy.patrolIndex = 1;
            enemy.patrolDir = 1;
          }
        } else {
          const speed = 0.5 * dt;
          const nx = enemy.x + (tdx / tdist) * speed;
          const ny = enemy.y + (tdy / tdist) * speed;
          if (this._canMoveTo(nx, ny)) {
            enemy.x = nx; enemy.y = ny;
          }
        }
      }

      // Collision damage
      if (dist < 0.5 && enemy.damageTimer <= 0 && this.invincibleTimer <= 0) {
        const dmg = enemy.boss ? 25 : enemy.variant === 'red' ? 15 : 10;
        this.health -= dmg;
        enemy.damageTimer = 60; // 1 second cooldown
        this.invincibleTimer = 0.5;
        this.addMessage(`💀 受到 ${dmg} 点伤害!`, 90);

        // Knockback
        const kbDist = 0.5;
        const kbx = this.player.x + (dx / dist) * kbDist;
        const kby = this.player.y + (dy / dist) * kbDist;
        if (this._canMoveTo(kbx, kby)) {
          this.player.x = kbx; this.player.y = kby;
        }

        if (this.health <= 0) {
          this.health = 0;
          this.gameOver = true;
          this.addMessage('💀 被妖怪包围了...', 300);
        }
      }
      if (enemy.damageTimer > 0) enemy.damageTimer--;
    }
  }

  _checkItemPickup() {
    const p = this.player;
    for (const item of this.items) {
      if (item.collected) continue;
      const dx = p.x - item.x, dy = p.y - item.y;
      if (Math.sqrt(dx * dx + dy * dy) < 0.5) {
        item.collected = true;
        switch (item.type) {
          case 'key':
            this.keys[item.subtype] = (this.keys[item.subtype] || 0) + 1;
            this.addMessage(`🔑 获得 ${item.subtype === 'gold' ? '金' : item.subtype === 'silver' ? '银' : '水晶'} 钥匙!`, 120);
            break;
          case 'health':
            this.health = Math.min(this.maxHealth, this.health + 25);
            this.addMessage('❤️ +25 生命值!', 90);
            break;
          case 'torch':
            this.torchTimer = 30;
            this.addMessage('🔥 灯笼罩点亮了! 视野扩大 30秒', 120);
            break;
          case 'coin':
            this.score += 100;
            this.addMessage('💰 +100 金币!', 60);
            break;
        }
      }
    }
  }

  _interact() {
    const p = this.player;
    // Check if player is facing a door
    const checkDist = 1.5;
    const cx = p.x + p.dirX * checkDist;
    const cy = p.y + p.dirY * checkDist;
    const mx = Math.floor(cx), my = Math.floor(cy);

    if (my >= 0 && my < this.map.length && mx >= 0 && mx < this.map[0].length) {
      const cell = this.map[my][mx];
      if (cell === 5) {
        // Locked door - check for key
        const door = this.doors.find(d => d.x === mx && d.y === my);
        if (door && this.keys[door.keyType] > 0) {
          this.keys[door.keyType]--;
          door.open = true;
          this.map[my][mx] = 6; // Change to open door
          this.engine = new RaycastEngine(this.map); // Refresh engine
          this.addMessage(`🚪 门已打开!`, 90);
        } else if (door) {
          this.addMessage(`🔒 需要 ${door.keyType === 'gold' ? '金' : door.keyType === 'silver' ? '银' : '水晶'} 钥匙!`, 90);
        }
      }
    }
  }

  _checkExit() {
    const p = this.player;
    if (!this.exit) return;
    const dx = p.x - (this.exit.x + 0.5);
    const dy = p.y - (this.exit.y + 0.5);
    if (Math.sqrt(dx * dx + dy * dy) < 0.8) {
      this.score += 500;
      if (this.currentFloor + 1 >= FLOORS.length) {
        this.gameWon = true;
        this.addMessage('🏆 你逃出了古堡!', 600);
      } else {
        this.addMessage(`⬇️ 进入下一层...`, 60);
        this._loadFloor(this.currentFloor + 1);
      }
    }
  }

  addMessage(text, duration) {
    this.messages.push(text);
    this.messageTimer = Math.max(this.messageTimer, duration / 60);
    if (this.messages.length > 5) this.messages.shift();
  }

  // Get sprites for rendering (enemies + items)
  getSprites() {
    const sprites = [];
    for (const enemy of this.enemies) {
      if (enemy.alive) sprites.push(enemy);
    }
    for (const item of this.items) {
      if (!item.collected) sprites.push(item);
    }
    if (this.exit) {
      sprites.push({ ...this.exit, x: this.exit.x + 0.5, y: this.exit.y + 0.5, type: 'exit' });
    }
    return sprites;
  }

  getTorchMultiplier() {
    return this.torchTimer > 0 ? 1.5 : 1.0;
  }
}

</script>
<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const offCanvas = document.createElement('canvas');
offCanvas.width = RENDER_W; offCanvas.height = RENDER_H;
const offCtx = offCanvas.getContext('2d');
const minimap = document.getElementById('minimap');
const mctx = minimap.getContext('2d');

let game, running = false, lastTime = 0;
const input = { forward:false, backward:false, left:false, right:false, strafeLeft:false, strafeRight:false, use:false, _prevUse:false, mouseX:0 };

function resizeCanvas() {
  canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
  canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Draw character avatar
(function drawAvatar() {
  const ac = document.getElementById('char-avatar');
  if (!ac) return;
  const a = ac.getContext('2d');
  a.imageSmoothingEnabled = false;
  // Background
  a.fillStyle = '#2d1040'; a.fillRect(0,0,56,56);
  // Hair (dark purple)
  a.fillStyle = '#4a1a6b';
  a.beginPath(); a.ellipse(28,20,18,18,0,0,Math.PI); a.fill();
  a.fillRect(10,20,10,24); a.fillRect(36,20,10,24);
  // Face
  a.fillStyle = '#FFE0CC';
  a.beginPath(); a.ellipse(28,26,14,15,0,0,Math.PI*2); a.fill();
  // Eyes
  a.fillStyle = '#3a1a3a';
  a.beginPath(); a.ellipse(22,24,4,5.5,0,0,Math.PI*2); a.fill();
  a.beginPath(); a.ellipse(34,24,4,5.5,0,0,Math.PI*2); a.fill();
  // Eye sparkles
  a.fillStyle = '#FFF';
  a.beginPath(); a.arc(20,22,1.5,0,Math.PI*2); a.fill();
  a.beginPath(); a.arc(32,22,1.5,0,Math.PI*2); a.fill();
  // Mouth
  a.fillStyle = '#E87878';
  a.beginPath(); a.ellipse(28,32,3.5,2,0,0,Math.PI); a.fill();
  // Cheeks
  a.fillStyle = 'rgba(255,150,150,0.5)';
  a.beginPath(); a.ellipse(18,30,2.5,2,0,0,Math.PI*2); a.fill();
  a.beginPath(); a.ellipse(38,30,2.5,2,0,0,Math.PI*2); a.fill();
  // Hair accessory (flower)
  a.fillStyle = '#FF8A80'; a.beginPath(); a.arc(40,18,5,0,Math.PI*2); a.fill();
  a.fillStyle = '#FFD54F'; a.beginPath(); a.arc(40,18,2.5,0,Math.PI*2); a.fill();
  // Bow on top
  a.fillStyle = '#FF4081';
  a.beginPath(); a.moveTo(28,8); a.lineTo(22,14); a.lineTo(28,12); a.fill();
  a.beginPath(); a.moveTo(28,8); a.lineTo(34,14); a.lineTo(28,12); a.fill();
})();

// Keyboard
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowup') input.forward = true;
  if (k === 'arrowdown') input.backward = true;
  if (k === 'arrowleft') input.strafeLeft = true;
  if (k === 'arrowright') input.strafeRight = true;
  if (k === 'e') input.use = true;
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowup') input.forward = false;
  if (k === 'arrowdown') input.backward = false;
  if (k === 'arrowleft') input.strafeLeft = false;
  if (k === 'arrowright') input.strafeRight = false;
  if (k === 'e') input.use = false;
});

// Mouse
// Pointer lock disabled
// Mouse look disabled

// Mobile controls
['m-up','m-down','m-left','m-right','m-use'].forEach((id, i) => {
  const btn = document.getElementById(id);
  const keys = ['forward','backward','left','right','use'];
  if (!btn) return;
  btn.addEventListener('pointerdown', e => { e.preventDefault(); input[keys[i]] = true; });
  btn.addEventListener('pointerup', () => { input[keys[i]] = false; });
  btn.addEventListener('pointerleave', () => { input[keys[i]] = false; });
});

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('char-panel').style.display = 'flex';
  game = new Game();
  game.engine.screenW = RENDER_W;
  game.engine.screenH = RENDER_H;
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function loop(now) {
  if (!running) return;
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  game.update(dt, input);
  input.mouseX = 0;

  game.engine.renderFrame(offCtx, game.player, game.getSprites());

  ctx.fillStyle = '#0d0015';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingEnabled = false;

  const scaleX = canvas.width / RENDER_W, scaleY = canvas.height / RENDER_H;
  const scale = Math.min(scaleX, scaleY);
  const ox = (canvas.width - RENDER_W * scale) / 2;
  const oy = (canvas.height - RENDER_H * scale) / 2;
  ctx.drawImage(offCanvas, 0, 0, RENDER_W, RENDER_H, ox, oy, RENDER_W * scale, RENDER_H * scale);

  renderMinimap();
  updateHUD();
  renderMessages();

  if (game.floorTransition) {
    const el = document.getElementById('floor-name');
    if (el) el.remove();
    const d = document.createElement('div');
    d.id = 'floor-name';
    d.innerHTML = FLOORS[game.currentFloor].name + '<span class="exit-hint">🚪 出口光芒: ' + (FLOORS[game.currentFloor].exitColor || '未知') + '</span>';
    document.body.appendChild(d);
  }

  if (game.gameOver || game.gameWon) {
    running = false;
    // document.exitPointerLock();
    showEndScreen();
  }
  requestAnimationFrame(loop);
}

// Minimap
function renderMinimap() {
  if (!game) return;
  const map = game.map, mw = map[0].length, mh = map.length;
  const cs = Math.ceil(Math.min(minimap.width/mw, minimap.height/mh));
  const ox = Math.floor((minimap.width - mw*cs)/2), oy = Math.floor((minimap.height - mh*cs)/2);
  mctx.fillStyle = 'rgba(13,0,21,0.85)';
  mctx.fillRect(0, 0, minimap.width, minimap.height);

  const wcolors = {1:'#D4C4A8',2:'#E8C4A8',3:'#F0DCC0',4:'#A5D6A7',5:'#FF8A80',7:'#CE93D8',8:'#FFCC80'};
  for (let y=0;y<mh;y++) for (let x=0;x<mw;x++) {
    const c = map[y][x];
    if (c>0 && c!==6) { mctx.fillStyle=wcolors[c]||'#E8DCC8'; mctx.fillRect(ox+x*cs,oy+y*cs,cs,cs); }
  }
  if (game.exit) { mctx.fillStyle='#CE93D8'; mctx.fillRect(ox+game.exit.x*cs,oy+game.exit.y*cs,cs,cs); }
  const icolors = {key:'#FFD54F',health:'#FF8A80',torch:'#FFB74D',coin:'#FFD54F'};
  for (const it of game.items)
    if (!it.collected) { mctx.fillStyle=icolors[it.type]||'#FFF'; mctx.fillRect(ox+it.x*cs-1,oy+it.y*cs-1,3,3); }
  for (const en of game.enemies)
    if (en.alive) {
      mctx.fillStyle=en.variant==='boss'?'#E040FB':en.variant==='red'?'#FF8A80':'#64B5F6';
      mctx.fillRect(ox+en.x*cs-2,oy+en.y*cs-2,4,4);
    }
  mctx.fillStyle='#FFD54F';
  const px=ox+game.player.x*cs, py=oy+game.player.y*cs;
  mctx.beginPath(); mctx.arc(px,py,3,0,Math.PI*2); mctx.fill();
  mctx.strokeStyle='#FFD54F'; mctx.lineWidth=1.5;
  mctx.beginPath(); mctx.moveTo(px,py); mctx.lineTo(px+game.player.dirX*8,py+game.player.dirY*8); mctx.stroke();
}

function updateHUD() {
  if (!game) return;
  const pct = Math.round((game.health/game.maxHealth)*100);
  document.getElementById('floor-tag').textContent = `${FLOORS[game.currentFloor].name} · ${game.currentFloor+1}/${FLOORS.length}F`;
  document.getElementById('hud-health').style.width = `${pct}%`;
  document.getElementById('hud-hp-val').textContent = `${game.health}/${game.maxHealth}`;
  document.getElementById('char-hp-text').textContent = `❤️ ${game.health}/${game.maxHealth}`;
  // Key badges
  const kg = document.getElementById('key-gold'), ks = document.getElementById('key-silver'), kc = document.getElementById('key-crystal');
  kg.textContent = `🔑 金 ${game.keys.gold||0}`; kg.className = 'key-badge' + (game.keys.gold?' active':'');
  ks.textContent = `🔑 银 ${game.keys.silver||0}`; ks.className = 'key-badge' + (game.keys.silver?' active':'');
  kc.textContent = `🔑 晶 ${game.keys.crystal||0}`; kc.className = 'key-badge' + (game.keys.crystal?' active':'');
  document.getElementById('score-display').textContent = `💰 ${game.score} 金币`;
}

function renderMessages() {
  document.getElementById('messages').innerHTML = (game && game.messages.length)
    ? game.messages.map(m => `<div class="msg">${m}</div>`).join('') : '';
}

function showEndScreen() {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.getElementById('char-panel').style.display = 'none';
  ov.innerHTML = game.gameWon ? `
    <h1>✨ 恭喜脱出!</h1>
    <h2>YOU ESCAPED</h2>
    <p class="stat">最终得分: ${game.score} 金币</p>
    <p class="sub">灵梦成功净化了妖怪迷城，回到人间！🌸</p>
    <button class="btn" onclick="location.reload()">再 来 一 次</button>
  ` : `
    <h1>💫 被妖怪捉住了</h1>
    <h2>GAME OVER</h2>
    <p class="stat">到达: ${FLOORS[game.currentFloor].name} · 得分: ${game.score}</p>
    <button class="btn" onclick="location.reload()">再 试 一 次</button>
  `;
}
</script>
</body>
